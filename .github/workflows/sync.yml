name: Sync fork with upstream (rebase)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/tulir/whatsmeow.git
          git fetch upstream

      - name: Capture SHA before rebase
        id: before
        run: echo "sha=$(git rev-parse main)" >> "$GITHUB_OUTPUT"

      - name: Rebase main on upstream
        run: |
          git rebase upstream/main
          git push origin main --force-with-lease

      - name: Capture SHA after rebase
        id: after
        run: echo "sha=$(git rev-parse main)" >> "$GITHUB_OUTPUT"

      - name: Trigger app pipeline (only if changed)
        if: steps.before.outputs.sha != steps.after.outputs.sha
        run: |
          curl --fail -X POST \
            -F token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
            -F ref=main \
            -F "variables[UPDATE_WHATSMEOW]=true" \
            https://gitlab.com/api/v4/projects/${{ secrets.GITLAB_PROJECT_ID }}/trigger/pipeline

      # mantém o repo "vivo" mesmo quando não há nada do upstream pra puxar
      - name: Keep repo active
        uses: gautamkrishnar/keepalive-workflow@v2
